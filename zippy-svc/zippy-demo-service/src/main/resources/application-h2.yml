spring:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:h2:mem:zippy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
          username: sa
          password:
          driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
