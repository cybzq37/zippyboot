server:
  port: 28080

spring:
  application:
    name: zyn-demo
  profiles:
    active: @spring.profiles.active@
  jackson:
    time-zone: Asia/Shanghai

  # ==================== 数据源 ====================
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:postgresql://localhost:5432/zyn_base
          username: postgres
          password: ${POSTGRES_PASSWORD:Zyn@Secure#99}
          driver-class-name: org.postgresql.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:Zyn@Secure#99}
      database: 0

    # ==================== Elasticsearch ====================
    elasticsearch:
      uris: http://localhost:9200
      username: elastic
      password: ${ELASTIC_PASSWORD:Zyn@Secure#99}

  # ==================== Kafka ====================
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      ack-mode: manual_immediate
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: zyn-group
      auto-offset-reset: earliest

# ==================== MyBatis-Plus ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ==================== Sa-Token ====================
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true

# ==================== SpringDoc ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== Zyn ====================
zyn:
  satoken:
    enabled: true
    login-type: login
    token-prefix: Bearer
    root-user-id: 1
  mybatis:
    enabled: true
  storage:
    enabled: true
    type: LOCAL
    public-base-url: ""
    date-path-pattern: yyyy/MM/dd
    filename-strategy: UUID
    conflict-strategy: APPEND_SUFFIX
    max-in-memory-read-bytes: 10485760
    local:
      root-path: ./uploads
      access-path-prefix: /uploads
    s3:
      bucket: zyn
      endpoint: http://localhost:8333
      region: cn-north-1
      access-key: ${S3_ACCESS_KEY:zynex}
      secret-key: ${S3_SECRET_KEY:Zyn@Secure#99}
      domain: ""
      path-style-access: true
  global:
    web:
      exception:
        enabled: true
        include-stack-trace: false
        log-warn-for-business: false
      response:
        enabled: true
        success-code: "0"
        success-message: OK
  kit:
    okhttp:
      connect-timeout-seconds: 2
      read-timeout-seconds: 8
      write-timeout-seconds: 8
      call-timeout-seconds: 12
      throw-on-http-error: false
      enable-log-interceptor: false
