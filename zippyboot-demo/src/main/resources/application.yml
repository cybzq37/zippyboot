server:
  port: 8080

spring:
  application:
    name: zippyboot-demo

  # ==================== 数据源（dynamic-datasource 多数据源） ====================
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:postgresql://localhost:5432/zippyboot
          username: postgres
          password: postgres
          driver-class-name: org.postgresql.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # password:
      # timeout: 3000ms
      # lettuce:
      #   pool:
      #     max-active: 8
      #     max-idle: 8
      #     min-idle: 0

    # ==================== Elasticsearch ====================
    elasticsearch:
      uris: http://localhost:9200
      # username:
      # password:
      # connection-timeout: 1s
      # socket-timeout: 30s

  # ==================== Kafka ====================
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      ack-mode: manual_immediate
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # retries: 3
      # acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: zippyboot-group
      auto-offset-reset: earliest
      # enable-auto-commit: false

# ==================== MyBatis-Plus ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # global-config:
  #   db-config:
  #     logic-delete-field: deleted
  #     logic-delete-value: 1
  #     logic-not-delete-value: 0

# ==================== Sa-Token（框架级配置） ====================
sa-token:
  token-name: Authorization
  timeout: 2592000            # Token 有效期（秒），30 天
  active-timeout: -1          # Token 临时有效期（秒），-1 表示不限
  is-concurrent: true         # 是否允许同一账号并发登录
  is-share: false             # 是否共享 Token（多人共用同一 Token）
  token-style: uuid           # Token 生成风格：uuid / random-32 / simple-uuid / random-64 / tik
  is-log: true                # 是否输出操作日志

# ==================== SpringDoc (Swagger) ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== ZippyBoot 自定义配置 ====================
zippyboot:

  # ---------- Sa-Token 扩展（zippyboot-infra-redis） ----------
  satoken:
    enabled: true
    login-type: login          # 登录类型标识，多用户体系时区分（如 login / admin / app）
    token-prefix: Bearer       # Token 前缀，前端请求头格式：Bearer xxx
    root-user-id: 1            # 超级管理员用户ID，LoginHelper.isRoot() 判断依据

  # ---------- MyBatis 扩展（zippyboot-infra-mybatis） ----------
  mybatis:
    enabled: true              # 是否启用 MyBatis 扩展（分页拦截器、类型处理器等）

  # ---------- 文件存储（zippyboot-infra-storage） ----------
  storage:
    enabled: true
    type: LOCAL                        # 存储类型：LOCAL（本地磁盘） | S3（兼容 S3 协议的对象存储）
    public-base-url: ""                # 公共访问基础URL，拼接后生成文件访问地址
    date-path-pattern: yyyy/MM/dd      # 日期路径格式，按日期分目录存储
    filename-strategy: UUID            # 文件名策略：UUID（随机） | ORIGINAL（保留原文件名）
    conflict-strategy: APPEND_SUFFIX   # 文件名冲突策略：APPEND_SUFFIX | FAIL | OVERWRITE
    max-in-memory-read-bytes: 10485760 # 内存中读取的最大字节数（10MB），超过则流式读取
    local:
      root-path: ./uploads             # 本地存储根目录
      access-path-prefix: /uploads     # 访问路径前缀，与 WebMvc 资源映射配合
    s3:
      bucket: zippyboot                # S3 Bucket 名称
      endpoint: ""                     # S3 端点地址（如 http://minio:9000），留空则使用 AWS 默认
      region: us-east-1                # S3 区域
      access-key: ""                   # 访问密钥，留空则使用默认凭证链（环境变量 / IAM 角色）
      secret-key: ""                   # 秘密密钥
      domain: ""                       # 自定义访问域名，留空则使用 S3 默认 URL
      path-style-access: true          # 是否使用路径风格（MinIO 等需要开启）

  # ---------- Web 基础设施（zippyboot-infra-web） ----------
  global:
    web:
      exception:
        enabled: true                    # 是否启用全局异常处理
        include-stack-trace: false       # 5xx 错误响应中是否包含堆栈信息（生产环境建议关闭）
        log-warn-for-business: false     # 业务异常（4xx）是否以 WARN 级别记录日志
      response:
        enabled: true                    # 是否启用响应自动包装（Controller 返回值自动包装为 ApiResponse）
        success-code: "0"                # 成功响应码
        success-message: OK              # 成功响应消息

  # ---------- OkHttp 客户端（zippyboot-kit） ----------
  kit:
    okhttp:
      connect-timeout-seconds: 2       # 建立 TCP 连接超时（秒）
      read-timeout-seconds: 8          # 读取响应超时（秒）
      write-timeout-seconds: 8         # 发送请求体超时（秒）
      call-timeout-seconds: 12         # 单次请求总超时（秒）
      throw-on-http-error: false       # HTTP 非 2xx 时是否抛异常（false 则返回 HttpResponse）
      enable-log-interceptor: false    # 是否启用 OkHttp 请求日志（DEBUG 级别）
