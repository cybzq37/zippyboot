# ──────────────────────────────────────────────────────────────
# 生产环境（Docker/K8s 内部通信）
# ──────────────────────────────────────────────────────────────

spring:
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:postgresql://postgres:5432/zyn_base
          username: postgres
          password: ${POSTGRES_PASSWORD:Zyn@Secure#99}
          driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:Zyn@Secure#99}
      database: 0
    elasticsearch:
      uris: http://elasticsearch:9200
      username: elastic
      password: ${ELASTIC_PASSWORD:Zyn@Secure#99}
  kafka:
    bootstrap-servers: kafka:9092

zyn:
  discovery:
    services:
      sys: http://zyn-sys:28081
      netty: http://zyn-netty:28082
  storage:
    s3:
      endpoint: http://seaweedfs-s3:8333
